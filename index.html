<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Gaussian Splatting Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: rgba(0, 0, 0, 0.3);
            color: white;
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.8;
        }

        #canvas {
            flex: 1;
            display: block;
            width: 100%;
            height: 100%;
        }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 15px 20px;
            border-radius: 8px;
            font-size: 14px;
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .controls p {
            margin: 5px 0;
        }

        .controls strong {
            color: #667eea;
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 30px;
            border-radius: 8px;
            text-align: center;
            z-index: 20;
            display: none;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>馃帹 3D Gaussian Splatting Viewer</h1>
            <p>Interactive WebGL 3D Rendering</p>
        </div>
        <canvas id="canvas"></canvas>
        <div class="controls">
            <p><strong>Mouse:</strong> Drag to rotate</p>
            <p><strong>Scroll:</strong> Zoom in/out</p>
            <p><strong>Status:</strong> <span id="status">Loading...</span></p>
        </div>
        <div class="loading active" id="loading">
            <div class="spinner"></div>
            <p>Loading PLY model...</p>
        </div>
    </div>

    <script src="src/utils.js?v=2"></script>
    <script src="src/camera.js?v=2"></script>
    <script src="src/loader.js?v=2"></script>
    <script src="src/main.js?v=2"></script>
</body>
</html>
